name: Post
options:
  bundleIdPrefix: co.gitwork.post
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    # Signing is pinned here so it survives `xcodegen generate` (no more re-adding the team each
    # time). Automatic signing + the team lets Xcode pick the right cert/profile: a real
    # "Apple Development" identity for device, ad-hoc for the Simulator.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: B27Y4M6S3Y
    CODE_SIGN_IDENTITY: "Apple Development"

packages:
  PostKit:
    path: Packages/PostKit

targets:
  Post:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "AppIcon.icon"          # added explicitly below so XcodeGen treats the .icon as one bundle
      - path: App/AppIcon.icon       # Icon Composer (Liquid Glass) app icon
        type: file
        buildPhase: resources
      - path: Library
      - path: Intents
      - path: Shaders
    dependencies:
      - package: PostKit
      - target: PostShareExtension
      - target: PostPhotosExtension
    entitlements:
      path: App/Post.entitlements
      properties:
        com.apple.security.application-groups:
          - group.co.gitwork.post
        # iCloud sync (opt-in, off by default). The code is ready; uncomment these THREE keys,
        # create the "iCloud.co.gitwork.post" CloudKit container in the Apple Developer portal,
        # provision it on your signing profile, then `xcodegen generate`. Left commented so the
        # default build installs on-device without iCloud provisioning (keeping all other QA
        # unblocked). When enabled, also uncomment UIBackgroundModes below for push-driven sync.
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.co.gitwork.post
        # com.apple.developer.icloud-services:
        #   - CloudKit
        # com.apple.developer.ubiquity-container-identifiers:
        #   - iCloud.co.gitwork.post
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.gitwork.post
        PRODUCT_NAME: Post
        MTL_COMPILER_FLAGS: "-fcikernel"
        MTLLINKER_FLAGS: "-fcikernel"
        INFOPLIST_KEY_CFBundleDisplayName: Post
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Post saves your finished edits straight to your photo library."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Allow access so you can browse and import from your photo library inside Post. Your photos are read on-device only and never leave your device."
        INFOPLIST_KEY_NSCameraUsageDescription: "Snap a photo to edit right away."
        # iOS 27 expects all orientations unless the app requires full screen (which would kill iPad
        # multitasking / Stage Manager). Our layout is fully adaptive, so support all four.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        # Export compliance: the app uses only Apple's standard/exempt encryption
        # (HTTPS), so no annual self-classification doc is required — declaring this
        # lets TestFlight/App Store builds skip the "missing compliance" prompt.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.photography
        # For iCloud sync, uncomment to let CloudKit push remote changes in the background:
        # INFOPLIST_KEY_UIBackgroundModes: remote-notification
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PostShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shaders
    dependencies:
      - package: PostKit
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Post
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
    entitlements:
      path: ShareExtension/PostShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.co.gitwork.post
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: co.gitwork.post.ShareExtension
        MTL_COMPILER_FLAGS: "-fcikernel"
        MTLLINKER_FLAGS: "-fcikernel"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Post saves your edited photo to your library."

  PostPhotosExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PhotosExtension
      - path: Shaders
    dependencies:
      - package: PostKit
    info:
      path: PhotosExtension/Info.plist
      properties:
        CFBundleDisplayName: Post
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.photo-editing
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PhotoEditingViewController
          NSExtensionAttributes:
            PHSupportedMediaTypes:
              - Image
    entitlements:
      path: PhotosExtension/PostPhotosExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.co.gitwork.post
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: co.gitwork.post.PhotosExtension
        MTL_COMPILER_FLAGS: "-fcikernel"
        MTLLINKER_FLAGS: "-fcikernel"

schemes:
  Post:
    build:
      targets:
        Post: all
    run:
      config: Debug
  # Engine tests live in the PostKit package (Packages/PostKit/Tests/PostKitTests) and run via the
  # auto-generated "PostKit" scheme: xcodebuild test -scheme PostKit …
