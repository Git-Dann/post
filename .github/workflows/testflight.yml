name: TestFlight

# Manual trigger only for now. Once the App Store Connect API-key secrets are
# in place (see below) and a runner with Xcode 27 is available, add an
# automatic trigger by uncommenting the `push` block:
#   push:
#     branches: [main]
on:
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  beta:
    name: Build & upload to TestFlight
    # Needs a macOS runner that ships Xcode 27 beta (iOS 27 SDK / Liquid Glass).
    # GitHub's hosted images may not carry the beta yet — if `Select Xcode` fails,
    # switch this to a self-hosted runner that has Xcode 27 beta installed.
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Built with the Xcode 27 beta toolchain (Swift 6 / iOS 27 SDK).
      - name: Select Xcode 27 beta
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "27.0"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up Ruby (Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build & upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane beta
